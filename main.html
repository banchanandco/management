<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banchan and Co</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#9caf88;--accent-dark:#7a9068;--accent-bg:#f0f5ec;--accent-light:#c8d9bc;--bg:#f5f4f0;--surface:#fff;--border:#dedad3;--subtle:#eceae5;--muted:#9a9488;--body:#4a4540;--heading:#2a2520;--brown:#5c3d2e;--brown-light:#8b6355}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

    /* HEADER */
    header{background:var(--accent);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
    .header-left{display:flex;align-items:center;gap:12px}
    .hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
    .header-logo{height:28px;object-fit:contain;filter:brightness(0) invert(1)}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover}
    .header-date{font-size:0.68rem;color:rgba(255,255,255,0.75)}

    /* DRAWER */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--surface);z-index:301;transition:left .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.12)}
    .drawer.open{left:0}
    .drawer-header{background:var(--accent);padding:44px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .drawer-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover;margin-bottom:4px}
    .drawer-name{font-size:1rem;font-weight:700;color:#fff}
    .drawer-email{font-size:0.73rem;color:rgba(255,255,255,0.65)}
    .drawer-menu{flex:1;padding:10px 0}
    .drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:0.9rem;color:var(--body);cursor:pointer}
    .drawer-item:active{background:var(--accent-bg)}
    .drawer-item .di-icon{font-size:1.2rem}
    .drawer-logout{margin:0 16px 20px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;width:calc(100% - 32px)}
    .drawer-logout:active{background:var(--subtle)}

    /* MAIN CONTENT */
    .main-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:32px}
    .welcome{text-align:center}
    .welcome h2{font-size:1.2rem;font-weight:700;color:var(--heading);margin-bottom:6px}
    .welcome p{font-size:0.85rem;color:var(--muted)}

    /* NAV BUTTONS */
    .nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:340px}
    .nav-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;text-decoration:none;transition:box-shadow .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
    .nav-btn:active{box-shadow:0 2px 12px rgba(156,175,136,0.25);border-color:var(--accent)}
    .nav-btn-icon{width:56px;height:56px;border-radius:16px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center}
    .nav-btn-icon svg{width:28px;height:28px}
    .nav-btn-label{font-size:0.9rem;font-weight:600;color:var(--heading)}
    .nav-btn-sub{font-size:0.72rem;color:var(--muted);text-align:center}
  </style>
</head>

  <!-- DRAWER -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <img class="drawer-avatar" id="drawer-avatar" src="" alt=""/>
      <div class="drawer-name" id="drawer-name"></div>
      <div class="drawer-email" id="drawer-email"></div>
    </div>
    <div class="drawer-menu">
      <div class="drawer-item" onclick="location.href='main.html'"><span class="di-icon">🏠</span> 홈</div>

      <div class="drawer-item" onclick="location.href='statistics.html'"><span class="di-icon">📊</span> 통계</div>
      <div class="drawer-item" onclick="location.href='schedule.html'"><span class="di-icon">📅</span> 스케줄</div>

  </div>
